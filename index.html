<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giot.ai - Intelligent Infrastructure AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="logo-main.png" alt="Giot.ai Logo" width="180">
            </div>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Platform</a></li>
                <li><a href="#">Solutions</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#" class="btn">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>Seeing the Invisible Layers</h1>
        <p>AI-Powered GIS & IoT for Fiber Networks and Digital Twins</p>
        <img src="logo-main.png" alt="Giot.ai Main Logo" class="hero-logo">
    </section>

    <section class="logos">
        <h2>Logo Variations</h2>
        <div class="logo-grid">
            <div class="logo-card">
                <img src="logo-main.png" alt="Primary Logo">
                <p>Primary</p>
            </div>
            <div class="logo-card">
                <img src="logo-icon.png" alt="Icon Only">
                <p>Icon Only</p>
            </div>
            <div class="logo-card">
                <img src="logo-mono.png" alt="Monochrome">
                <p>Monochrome</p>
            </div>
            <div class="logo-card">
                <img src="logo-glow.png" alt="Glowing Variant">
                <p>Glowing</p>
            </div>
            <div class="logo-card">
                <img src="logo-horizontal.png" alt="Horizontal">
                <p>Horizontal</p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Giot.ai — Part of Fiber911 / UnitiFlo</p>
    </footer>
